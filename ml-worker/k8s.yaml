apiVersion: apps/v1
kind: Deployment
metadata:
    name: ml-worker
spec:
    replicas: 0
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app: ml-worker
    template:
        metadata:
            labels:
                app: ml-worker
        spec:
            nodeSelector:
                workload: ml-gpu

            tolerations:
                - key: "dedicated"
                  operator: "Equal"
                  value: "ml-gpu"
                  effect: "NoSchedule"

            containers:
                - name: worker
                  image: cr.yandex/crpgiggf30987ecj5lp4/ocr-worker:latest
                  env:
                      - name: OCR_DPI
                        value: "150"
                      - name: OCR_CONCURRENCY
                        value: "2"

                  resources:
                      limits:
                          nvidia.com/gpu: "1"
                          memory: "15Gi"
                          cpu: "3"
                      requests:
                          memory: "15Gi"
                          cpu: "2"

                  livenessProbe:
                      httpGet:
                          path: /live
                          port: 8000
                      initialDelaySeconds: 20
                      periodSeconds: 30
                      timeoutSeconds: 5
                      failureThreshold: 3

                  readinessProbe:
                      httpGet:
                          path: /ready
                          port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
    name: ml-worker-nodeport
    namespace: ns
spec:
    type: NodePort
    selector:
        app: ml-worker
    ports:
        - name: grpc
          port: 50051
          targetPort: 50051
          nodePort: 30051
        - name: http
          port: 8000
          targetPort: 8000
          nodePort: 30800
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
    name: ml-worker-scaler
spec:
    scaleTargetRef:
        name: ml-worker

    pollingInterval: 5
    cooldownPeriod: 180

    minReplicaCount: 0
    maxReplicaCount: 1

    triggers:
        - type: metrics-api
          metadata:
              targetValue: "1"
              url: "http://experiments-app-service.experiments.svc.cluster.local:8080/v1/tasks/queue-metrics"
              valueLocation: "value"
              format: "json"
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: ml-worker-cpu
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app: ml-worker-cpu
    template:
        metadata:
            labels:
                app: ml-worker-cpu

        spec:
            containers:
                - name: worker
                  image: cr.yandex/crpgiggf30987ecj5lp4/ocr-worker:latest
                  env:
                      - name: OCR_DPI
                        value: "150"
                      - name: OCR_CONCURRENCY
                        value: "1"

                  resources:
                      limits:
                          memory: "6Gi"
                          cpu: "2.5"
                      requests:
                          memory: "5Gi"
                          cpu: "2.5"

                  livenessProbe:
                      httpGet:
                          path: /live
                          port: 8000
                      initialDelaySeconds: 20
                      periodSeconds: 30
                      timeoutSeconds: 5
                      failureThreshold: 3

                  readinessProbe:
                      httpGet:
                          path: /ready
                          port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
    name: ml-worker-cpu-nodeport
    namespace: ns
spec:
    type: NodePort
    selector:
        app: ml-worker-cpu
    ports:
        - name: grpc
          port: 50051
          targetPort: 50051
          nodePort: 30052
        - name: http
          port: 8000
          targetPort: 8000
          nodePort: 30801
