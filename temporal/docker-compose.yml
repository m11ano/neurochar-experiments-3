services:
  temporal-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: temporal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d temporal']
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: always
    volumes:
      - temporal-db-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.27
    depends_on:
      - temporal-db
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: password
      POSTGRES_SEEDS: temporal-db
      SERVICES: frontend,history,matching,worker
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
      SKIP_DEFAULT_NAMESPACE_CREATION: false
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/config-dynamic.yaml
    volumes:
      - ./config-dynamic.yaml:/etc/temporal/config/dynamicconfig/config-dynamic.yaml:ro
    healthcheck:
      test: ['CMD', 'tctl', '--address', '127.0.0.1:7233', 'cluster', 'health']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    ports:
      - '7233:7233'

  temporal-web:
    image: temporalio/web:latest
    depends_on:
      - temporal
    environment:
      TEMPORAL_GRPC_ENDPOINT: temporal:7233
      TEMPORAL_PERMIT_WRITE_API: 'true'
      BASE_PATH: /temporal-ui
    ports:
      - '8088:8088'

volumes:
  temporal-db-data:
